version: '3.4'
services:
  tb-gateway:
    image: thingsboard/tb-gateway:3.8-stable
    container_name: tb-gateway
    restart: always

    ports:
        - "5000:5000"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - TB_GW_HOST=host.docker.internal
      - TB_GW_PORT=1883
      - TB_GW_SECURITY_TYPE=accessToken
      - TB_GW_ACCESS_TOKEN=PUT_YOUR_ACCESS_TOKEN

    volumes:
      - tb-gw-config:/thingsboard_gateway/config
      - tb-gw-logs:/thingsboard_gateway/logs
      - tb-gw-extensions:/thingsboard_gateway/extensions
volumes:
  tb-gw-config:
    name: tb-gw-config
  tb-gw-logs:
    name: tb-gw-logs
  tb-gw-extensions:
    name: tb-gw-extensions
